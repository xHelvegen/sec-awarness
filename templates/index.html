<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Awareness - Device Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .info-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #555;
        }
        
        .info-value {
            color: #888;
            word-break: break-word;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .optional {
            font-size: 12px;
            color: #999;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Security Awareness</h1>
        <p class="subtitle">Device Information Collection - Help us understand your security posture</p>
        
        <div id="message"></div>
        
        <form id="infoForm">
            <div class="form-group">
                <label for="name">Name <span class="optional">(optional)</span></label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="email">Email <span class="optional">(optional)</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone <span class="optional">(optional)</span></label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label for="message">Message <span class="optional">(optional)</span></label>
                <textarea id="message" name="message" placeholder="Any comments or feedback?"></textarea>
            </div>
            
            <div class="info-section">
                <div class="info-item">
                    <span class="info-label">Browser:</span>
                    <span class="info-value" id="browserInfo">Detecting...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">OS:</span>
                    <span class="info-value" id="osInfo">Detecting...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Device:</span>
                    <span class="info-value" id="deviceInfo">Detecting...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Screen:</span>
                    <span class="info-value" id="screenInfo">Detecting...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">IP Address:</span>
                    <span class="info-value" id="ipInfo">Detecting...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Location:</span>
                    <span class="info-value" id="locationInfo">Detecting...</span>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="loader"></div>
                <p>Submitting...</p>
            </div>
            
            <button type="submit">Submit Information</button>
        </form>
    </div>
    
    <script>
        let trackingData = {
            mouseEvents: 0,
            clickEvents: 0,
            timeOnPage: 0,
            sessionId: ''
        };
        
        // Generate session ID
        function generateSessionId() {
            return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        // Parse user agent
        function parseUserAgent() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            let browserVersion = 'Unknown';
            let osName = 'Unknown';
            let osVersion = 'Unknown';
            let deviceType = 'desktop';
            let deviceBrand = 'Unknown';
            let deviceModel = 'Unknown';
            
            // Browser detection
            if (ua.indexOf('Firefox') > -1) {
                browserName = 'Firefox';
                browserVersion = ua.match(/Firefox\/([0-9.]+)/)?.[1] || 'Unknown';
            } else if (ua.indexOf('Chrome') > -1 && ua.indexOf('Chromium') === -1) {
                browserName = 'Chrome';
                browserVersion = ua.match(/Chrome\/([0-9.]+)/)?.[1] || 'Unknown';
            } else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) {
                browserName = 'Safari';
                browserVersion = ua.match(/Version\/([0-9.]+)/)?.[1] || 'Unknown';
            } else if (ua.indexOf('Edge') > -1 || ua.indexOf('Edg') > -1) {
                browserName = 'Edge';
                browserVersion = ua.match(/Edg.*\/([0-9.]+)/)?.[1] || 'Unknown';
            } else if (ua.indexOf('MSIE') > -1 || ua.indexOf('Trident') > -1) {
                browserName = 'Internet Explorer';
                browserVersion = ua.match(/(?:MSIE |rv:)([0-9.]+)/)?.[1] || 'Unknown';
            }
            
            // OS Detection
            if (ua.indexOf('Win') > -1) {
                osName = 'Windows';
                if (ua.indexOf('Windows NT 10.0') > -1) osVersion = '10/11';
                else if (ua.indexOf('Windows NT 6.3') > -1) osVersion = '8.1';
                else if (ua.indexOf('Windows NT 6.2') > -1) osVersion = '8';
                else if (ua.indexOf('Windows NT 6.1') > -1) osVersion = '7';
            } else if (ua.indexOf('Mac') > -1) {
                osName = 'macOS';
                osVersion = ua.match(/Mac OS X ([0-9_.]+)/)?.[1] || 'Unknown';
            } else if (ua.indexOf('X11') > -1) {
                osName = 'Linux';
            } else if (ua.indexOf('Android') > -1) {
                osName = 'Android';
                osVersion = ua.match(/Android ([0-9.]+)/)?.[1] || 'Unknown';
                deviceType = 'mobile';
                deviceBrand = ua.match(/([a-zA-Z]+);/)?.[1] || 'Unknown';
            } else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) {
                osName = 'iOS';
                osVersion = ua.match(/OS ([0-9_]+)/)?.[1]?.replace(/_/g, '.') || 'Unknown';
                deviceType = ua.indexOf('iPad') > -1 ? 'tablet' : 'mobile';
                deviceBrand = 'Apple';
                deviceModel = ua.indexOf('iPad') > -1 ? 'iPad' : 'iPhone';
            }
            
            return { browserName, browserVersion, osName, osVersion, deviceType, deviceBrand, deviceModel };
        }
        
        // Detect WebGL
        function detectWebGL() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                return !!gl;
            } catch(e) {
                return false;
            }
        }
        
        // Get connection info
        function getConnectionInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!connection) return { connectionType: 'Unknown', rtt: null, effectiveType: 'Unknown', downlink: null };
            
            return {
                connectionType: connection.type || 'Unknown',
                rtt: connection.rtt || null,
                effectiveType: connection.effectiveType || 'Unknown',
                downlink: connection.downlink || null
            };
        }
        
        // Collect device info
        async function collectDeviceInfo() {
            const ua = parseUserAgent();
            const connection = getConnectionInfo();
            
            const data = {
                userAgent: navigator.userAgent,
                ...ua,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                screenColorDepth: window.screen.colorDepth,
                screenPixelDepth: window.screen.pixelDepth,
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio || 1,
                ...connection,
                cookiesEnabled: navigator.cookieEnabled,
                localStorage: typeof(Storage) !== 'undefined',
                sessionStorage: typeof(sessionStorage) !== 'undefined',
                indexeddb: !!window.indexedDB,
                geolocationAvailable: 'geolocation' in navigator,
                webglAvailable: detectWebGL(),
                serviceWorkerAvailable: 'serviceWorker' in navigator,
                notificationPermission: Notification.permission || 'denied',
                pageLoadTime: performance.timing ? performance.timing.loadEventEnd - performance.timing.navigationStart : null,
                timeOnPage: trackingData.timeOnPage,
                mouseEvents: trackingData.mouseEvents,
                clickEvents: trackingData.clickEvents,
                scrollDepth: (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100 || 0,
                sessionId: trackingData.sessionId
            };
            
            // Fetch IP and location
            try {
                const response = await fetch('https://ipapi.co/json/');
                const locationData = await response.json();
                data.country = locationData.country_name;
                data.region = locationData.region;
                data.city = locationData.city;
                data.latitude = locationData.latitude;
                data.longitude = locationData.longitude;
                data.timezone = locationData.timezone;
                data.isp = locationData.org;
            } catch(e) {
                console.log('Could not fetch location data');
            }
            
            return data;
        }
        
        // Update displayed info
        async function updateDisplayedInfo() {
            const ua = parseUserAgent();
            document.getElementById('browserInfo').textContent = ua.browserName;
            document.getElementById('osInfo').textContent = ua.osName;
            document.getElementById('deviceInfo').textContent = ua.deviceType.charAt(0).toUpperCase() + ua.deviceType.slice(1);
            document.getElementById('screenInfo').textContent = `${window.screen.width}x${window.screen.height}`;
            
            try {
                const response = await fetch('https://ipapi.co/json/');
                const locationData = await response.json();
                document.getElementById('ipInfo').textContent = locationData.ip;
                document.getElementById('locationInfo').textContent = `${locationData.city}, ${locationData.country_name}`;
            } catch(e) {
                document.getElementById('ipInfo').textContent = 'Unable to detect';
                document.getElementById('locationInfo').textContent = 'Unable to detect';
            }
        }
        
        // Track events
        document.addEventListener('mousemove', () => {
            trackingData.mouseEvents++;
        });
        
        document.addEventListener('click', () => {
            trackingData.clickEvents++;
        });
        
        // Track time on page
        setInterval(() => {
            trackingData.timeOnPage += 1;
        }, 1000);
        
        // Form submission
        document.getElementById('infoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const messageEl = document.getElementById('message');
            const loadingEl = document.getElementById('loading');
            
            loadingEl.style.display = 'block';
            messageEl.innerHTML = '';
            
            try {
                const deviceInfo = await collectDeviceInfo();
                
                const formData = {
                    name: document.getElementById('name').value || null,
                    email: document.getElementById('email').value || null,
                    phone: document.getElementById('phone').value || null,
                    message: document.getElementById('message').value || null,
                    ...deviceInfo
                };
                
                const response = await fetch('/api/collect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    messageEl.className = 'message success';
                    messageEl.textContent = '✓ Your information has been submitted successfully!';
                    document.getElementById('infoForm').reset();
                    setTimeout(() => {
                        messageEl.innerHTML = '';
                    }, 5000);
                } else {
                    throw new Error(result.message || 'Submission failed');
                }
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.textContent = '✗ Error: ' + error.message;
            } finally {
                loadingEl.style.display = 'none';
            }
        });
        
        // Initialize
        trackingData.sessionId = generateSessionId();
        updateDisplayedInfo();
    </script>
</body>
</html>
